[build]
builder = "nixpacks"
nodeVersion = "22"
buildCommand = "pnpm install --no-frozen-lockfile && node_modules/.bin/vite build && node_modules/.bin/esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist"

[deploy]
startCommand = "NODE_ENV=production node dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
