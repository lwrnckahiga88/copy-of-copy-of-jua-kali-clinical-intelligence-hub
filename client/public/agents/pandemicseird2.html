<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pandemic Langflow PWA</title>
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQC" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f9fafb;
        margin: 0;
        padding: 0;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
    </style>
    <!-- Inline manifest.json -->
    <script id="app-manifest" type="application/json">
    {
      "name": "Pandemic Langflow PWA",
      "short_name": "PandemicFlow",
      "start_url": ".",
      "display": "standalone",
      "background_color": "#f9fafb",
      "theme_color": "#0ea5e9",
      "icons": [
        {
          "src": "icon-192.png",
          "sizes": "192x192",
          "type": "image/png"
        },
        {
          "src": "icon-512.png",
          "sizes": "512x512",
          "type": "image/png"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- React + ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts + lucide-react CDN fallback -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>

    <!-- Inline Service Worker -->
    <script>
      const swCode = `
        const CACHE_NAME = "pandemic-flow-cache-v1";
        const OFFLINE_URLS = ["/", "/index.html"];

        self.addEventListener("install", (event) => {
          event.waitUntil(
            caches.open(CACHE_NAME).then((cache) => cache.addAll(OFFLINE_URLS))
          );
        });

        self.addEventListener("fetch", (event) => {
          event.respondWith(
            caches.match(event.request).then((response) => {
              return response || fetch(event.request).catch(() => caches.match("/"));
            })
          );
        });

        self.addEventListener("activate", (event) => {
          event.waitUntil(
            caches.keys().then((keys) =>
              Promise.all(keys.map((k) => k !== CACHE_NAME && caches.delete(k)))
            )
          );
        });
      `;
      if ("serviceWorker" in navigator) {
        const blob = new Blob([swCode], { type: "text/javascript" });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl);
      }
    </script>

    <!-- Main React App -->
    <script type="text/babel">

    const { useState, useEffect, useRef } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar } = Recharts;
    const { Play, Pause, RotateCcw, Settings, Upload, Download } = lucideReact;

    // --- PandemicModel (your original code, integrated) ---
    const PandemicModel = () => {
      const [params, setParams] = useState({
        beta: 0.3,
        sigma: 1/5.1,
        gamma: 1/10,
        mu: 0.001,
        alpha: 0.1,
        rho: 0.05,
        populationSize: 1000000
      });

      const [initialConditions, setInitialConditions] = useState({
        susceptible: 999900,
        exposed: 50,
        infected: 50,
        recovered: 0,
        dead: 0
      });

      const [isRunning, setIsRunning] = useState(false);
      const [currentDay, setCurrentDay] = useState(0);
      const [data, setData] = useState([]);
      const [populations, setPopulations] = useState(initialConditions);
      const [showSettings, setShowSettings] = useState(false);
      const [interventionDay, setInterventionDay] = useState(30);
      const [realDataMode, setRealDataMode] = useState(false);
      const [uploadedData, setUploadedData] = useState(null);

      const [scenarioPresets] = useState({
        covid19: { beta: 0.4, sigma: 1/5.1, gamma: 1/10, mu: 0.002, populationSize: 1000000, name: "COVID-19 (Alpha variant)" },
        influenza: { beta: 0.5, sigma: 1/2, gamma: 1/7, mu: 0.0001, populationSize: 1000000, name: "Seasonal Influenza" },
        unknown_high: { beta: 0.6, sigma: 1/3, gamma: 1/14, mu: 0.005, populationSize: 1000000, name: "Unknown High Transmissibility" },
        unknown_severe: { beta: 0.25, sigma: 1/7, gamma: 1/21, mu: 0.01, populationSize: 1000000, name: "Unknown High Severity" }
      });

      const intervalRef = useRef(null);
      const timeStep = 1;

      // SEIRD equations
      const updatePopulations = (S, E, I, R, D, dt) => {
        const N = S + E + I + R;
        const { beta, sigma, gamma, mu, alpha } = params;
        const effectiveBeta = currentDay >= interventionDay ? beta * (1 - alpha) : beta;

        const newE = effectiveBeta * S * I / N * dt;
        const newI = sigma * E * dt;
        const newR = gamma * I * dt;
        const newD = mu * I * dt;

        return {
          susceptible: S - newE,
          exposed: E + newE - newI,
          infected: I + newI - newR - newD,
          recovered: R + newR,
          dead: D + newD
        };
      };

      const calculateMetrics = (S, E, I, R, D) => {
        const N = params.populationSize;
        const effectiveBeta = currentDay >= interventionDay ? params.beta * (1 - params.alpha) : params.beta;
        const R0 = effectiveBeta / (params.gamma + params.mu);
        const Rt = R0 * (S / N);
        const attackRate = ((N - S) / N) * 100;
        const cfr = D > 0 ? (D / (R + D)) * 100 : 0;
        const prevalence = (I / N) * 100000;
        return { R0, Rt, attackRate, cfr, prevalence };
      };

      const simulationStep = () => {
        setCurrentDay(prev => prev + 1);
        setPopulations(prev => {
          const newPops = updatePopulations(prev.susceptible, prev.exposed, prev.infected, prev.recovered, prev.dead, timeStep);
          const metrics = calculateMetrics(newPops.susceptible, newPops.exposed, newPops.infected, newPops.recovered, newPops.dead);
          setData(d => [...d, {
            day: currentDay + 1,
            ...newPops,
            newCases: newPops.infected - prev.infected,
            ...metrics
          }]);
          return newPops;
        });
      };

      const toggleSimulation = () => {
        if (isRunning) {
          clearInterval(intervalRef.current);
          setIsRunning(false);
        } else {
          intervalRef.current = setInterval(simulationStep, 500);
          setIsRunning(true);
        }
      };

      const resetSimulation = () => {
        clearInterval(intervalRef.current);
        setIsRunning(false);
        setCurrentDay(0);
        setPopulations(initialConditions);
        setData([{
          day: 0,
          ...initialConditions,
          newCases: 0,
          R0: params.beta / (params.gamma + params.mu),
          Rt: params.beta / (params.gamma + params.mu),
          attackRate: 0,
          cfr: 0,
          prevalence: (initialConditions.infected / params.populationSize) * 100000
        }]);
      };

      useEffect(() => { resetSimulation(); }, []);
      useEffect(() => () => clearInterval(intervalRef.current), []);

      const currentMetrics = data.length > 0 ? data[data.length - 1] : null;

      return (
        <div className="p-4 bg-white rounded-xl shadow">
          <h2 className="text-xl font-bold mb-2">Pandemic Epidemiological Model (SEIRD)</h2>
          <p className="text-gray-600 mb-4">Simulate Susceptible-Exposed-Infected-Recovered-Dead dynamics.</p>

          <div className="flex gap-2 mb-4">
            <button onClick={toggleSimulation} className="px-3 py-1 bg-blue-500 text-white rounded">
              {isRunning ? "Pause" : "Play"}
            </button>
            <button onClick={resetSimulation} className="px-3 py-1 bg-gray-500 text-white rounded">Reset</button>
          </div>

          <ResponsiveContainer width="100%" height={300}>
            <LineChart data={data}>
              <CartesianGrid strokeDasharray="3 3" />
              <XAxis dataKey="day" />
              <YAxis />
              <Tooltip />
              <Legend />
              <Line type="monotone" dataKey="infected" stroke="#ef4444" />
              <Line type="monotone" dataKey="recovered" stroke="#10b981" />
              <Line type="monotone" dataKey="dead" stroke="#6b7280" />
            </LineChart>
          </ResponsiveContainer>

          {currentMetrics && (
            <div className="mt-4 text-sm">
              <p>R0: {currentMetrics.R0.toFixed(2)} | Rt: {currentMetrics.Rt.toFixed(2)}</p>
              <p>Attack Rate: {currentMetrics.attackRate.toFixed(2)}% | CFR: {currentMetrics.cfr.toFixed(2)}%</p>
              <p>Prevalence: {currentMetrics.prevalence.toFixed(2)} /100k</p>
            </div>
          )}
        </div>
      );
    };

    // --- Root App ---
    const App = () => {
      return (
        <div className="max-w-6xl mx-auto p-6">
          <h1 className="text-3xl font-bold text-gray-800 mb-4">Unified Pandemic Langflow Builder PWA</h1>
          <PandemicModel />
          {/* Workflow builder, AI node editor, etc. can be added here */}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
