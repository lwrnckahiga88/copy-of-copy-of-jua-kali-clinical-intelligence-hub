<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NetStream Auto-PWA v2</title>
<meta name="theme-color" content="#6366f1">
<meta name="description" content="Offline streaming + IPFS caching + Livepeer + token rewards + background auto-preload">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>

<style>
:root{--bg:#0f0f23;--panel:#1a1a2e;--node:#16213e;--node-border:#3b4d6b;--accent:#6366f1;--text:#e2e8f0;--success:#10b981;--warning:#f59e0b;--error:#ef4444}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;min-height:100vh}
.panel{background:var(--panel);border-bottom:1px solid var(--node-border);padding:12px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-3{gap:12px}
.btn{background:var(--node);border:1px solid var(--node-border);border-radius:8px;padding:8px 12px;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.streaming{background:#ff6b6b;border-color:#ff6b6b;color:#fff}
.container{display:flex;gap:16px;padding:16px;align-items:flex-start}
.column{flex:1;min-width:300px}
.card{background:var(--panel);border:1px solid var(--node-border);border-radius:12px;padding:16px;margin-bottom:16px}
.stat-value{font-weight:700;font-size:1.25rem}
input.url-input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--node-border);background:var(--node);color:var(--text)}
canvas{background:transparent;border-radius:8px}
#results,#stream-results{color:#e6eef8}
.small{font-size:0.9rem;color:#9ca3af}
.flex-row{display:flex;gap:8px}
.muted{color:#94a3b8}
.video-container{aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;margin-bottom:8px}
ul{padding-left:16px}
</style>
</head>
<body>
<div class="app">
  <div class="panel flex items-center justify-between">
    <h1 style="margin:0;font-size:1.1rem;">NetStream Auto-PWA v2</h1>
    <div class="flex items-center gap-3">
      <button id="btn-toggle-blockchain" class="btn primary">Enable Blockchain</button>
      <button id="btn-run-full" class="btn streaming">Run Full Suite</button>
    </div>
  </div>

  <div class="container">
    <div class="column">
      <div class="card">
        <h2>Network Diagnostics</h2>
        <div id="results" class="small">Running automatically in background...</div>
        <canvas id="networkChart" height="160"></canvas>
      </div>

      <div class="card">
        <h3>Blockchain & Token Rewards</h3>
        <div>Blockchain: <strong id="bc-mode">OFF</strong></div>
        <div>Tokens: <strong id="token-balance">0</strong></div>
      </div>

      <div class="card">
        <h3>IPFS Auto-Preload Queue</h3>
        <ul id="ipfs-list"></ul>
      </div>
    </div>

    <div class="column">
      <div class="card">
        <h2>Streaming & Livepeer + IPFS</h2>
        <div class="video-container">
          <video id="test-video" controls></video>
        </div>
        <div id="stream-results" class="small muted">Comparisons run automatically.</div>
        <canvas id="streamCompareChart" height="140"></canvas>
      </div>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;right:16px;bottom:16px;background:#111827;color:#fff;padding:10px;border-radius:8px;display:none;"></div>

<script>
// ---------------------------
// Toast
// ---------------------------
function toast(msg,type='info'){
  const el=document.getElementById('toast');el.innerText=msg;
  el.style.display='block';
  el.style.background= type==='error' ? '#b91c1c' : type==='success' ? '#065f46' : '#111827';
  setTimeout(()=>el.style.display='none',3000);
}

// ---------------------------
// IndexedDB for offline caching, metrics, and history
// ---------------------------
let db;
const openDB=()=>new Promise((res,rej)=>{
  const request=indexedDB.open('NetStreamDB',1);
  request.onerror=()=>rej();
  request.onsuccess=()=>{db=request.result;res(db)};
  request.onupgradeneeded=e=>{
    db=e.target.result;
    if(!db.objectStoreNames.contains('metrics')) db.createObjectStore('metrics',{keyPath:'id',autoIncrement:true});
    if(!db.objectStoreNames.contains('ipfs')) db.createObjectStore('ipfs',{keyPath:'url'});
    if(!db.objectStoreNames.contains('history')) db.createObjectStore('history',{keyPath:'url'});
  };
});

// Save metrics
async function saveMetrics(type,data){
  const tx=db.transaction('metrics','readwrite');
  tx.objectStore('metrics').add({type,data,date:new Date().toISOString()});
}

// Save IPFS video offline
async function cacheIPFSVideo(url){
  if(!url) return;
  const res=await fetch(url);
  const blob=await res.blob();
  const tx=db.transaction('ipfs','readwrite');
  tx.objectStore('ipfs').put({url,blob});
  updateIPFSList(url,'cached');
  toast('IPFS video cached offline','success');
}

// Track video watch history
async function trackHistory(url){
  const tx=db.transaction('history','readwrite');
  tx.objectStore('history').put({url,lastWatched:new Date().toISOString()});
}

// Play cached IPFS video
async function playIPFSVideo(url){
  const tx=db.transaction('ipfs','readonly');
  const req=tx.objectStore('ipfs').get(url);
  req.onsuccess=()=>{
    const vid=document.getElementById('test-video');
    if(req.result){
      vid.src=URL.createObjectURL(req.result.blob);
      vid.play();
      trackHistory(url);
      awardTokens(3);
    }else{
      playVideo(url);
    }
  };
}

// ---------------------------
// Service Worker Inline for offline caching
// ---------------------------
(function registerSW(){
  const swScript=`const cacheName='netstream-offline-v4';
  self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(cacheName).then(c=>c.addAll(['/'])))});  
  self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
  self.addEventListener('fetch',e=>{
    if(e.request.url.endsWith('.m3u8')||e.request.url.endsWith('.mp4')){e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{const clone=resp.clone();caches.open(cacheName).then(c=>c.put(e.request,clone));return resp})));}else{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))} 
  });`;
  const swBlob=new Blob([swScript],{type:'application/javascript'});
  const swURL=URL.createObjectURL(swBlob);
  if('serviceWorker' in navigator){navigator.serviceWorker.register(swURL).then(()=>console.log('SW registered'));}  
})();

// ---------------------------
// State
// ---------------------------
let isBlockchainEnabled=false;
let tokenBalance=0;
let autoPreloadQueue=['https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8']; // Predefined list

// ---------------------------
// Network TTFB test
// ---------------------------
async function runNetworkTest(){
  const resultsEl=document.getElementById('results');resultsEl.innerText='Running network test...';
  for(const url of autoPreloadQueue){
    try{
      const start=performance.now();
      await fetch(url,{mode:'cors'});
      const ttfb=Math.round(performance.now()-start);
      saveMetrics('network',{url,ttfb});
      resultsEl.innerText+=`\n${url} TTFB: ${ttfb}ms`;
    }catch(err){console.error(err);}
  }
}

// ---------------------------
// Video playback + HLS
// ---------------------------
function playVideo(url){
  const vid=document.getElementById('test-video');
  if(Hls.isSupported()){
    const hls=new Hls();
    hls.loadSource(url);hls.attachMedia(vid);hls.on(Hls.Events.MANIFEST_PARSED,()=>vid.play());
  }else{vid.src=url;vid.play();}
  trackHistory(url);
  awardTokens(2);
  saveMetrics('play',{url});
}

// ---------------------------
// Stream comparison
// ---------------------------
async function compareStreams(){
  for(const url of autoPreloadQueue){
    const buffer=Math.random()*300+50;
    saveMetrics('stream',{url,buffer});
    awardTokens(5);
  }
}

// ---------------------------
// Blockchain & token simulation
// ---------------------------
function toggleBlockchain(){
  isBlockchainEnabled=!isBlockchainEnabled;
  document.getElementById('bc-mode').innerText=isBlockchainEnabled?'ON':'OFF';
  toast(`Blockchain ${isBlockchainEnabled?'enabled':'disabled'}`,'success');
}

function awardTokens(amount){
  tokenBalance+=amount;
  document.getElementById('token-balance').innerText=tokenBalance;
}

// ---------------------------
// IPFS Auto-Preload Queue
// ---------------------------
function updateIPFSList(url,status='queued'){
  const ul=document.getElementById('ipfs-list');
  const existing=ul.querySelector(`[data-url="${url}"]`);
  if(existing){existing.innerText=`${url} - ${status}`;return;}
  const li=document.createElement('li');li.innerText=`${url} - ${status}`;li.dataset.url=url;
  ul.appendChild(li);
}

async function autoPreloadQueueRun(){
  for(const url of autoPreloadQueue){
    updateIPFSList(url,'preloading');
    await cacheIPFSVideo(url);
    playIPFSVideo(url);
  }
}

// ---------------------------
// Full suite
// ---------------------------
async function runFullSuite(){
  await runNetworkTest();
  compareStreams();
  await autoPreloadQueueRun();
  if(isBlockchainEnabled){awardTokens(10);}
  toast('Full suite auto-run completed!','success');
}

// ---------------------------
// Initialization
// ---------------------------
openDB().then(()=>{
  toast('NetStream Auto-PWA v2 ready!','success');
  runFullSuite(); // auto-run everything in background
});

// ---------------------------
// Event listeners
// ---------------------------
document.getElementById('btn-toggle-blockchain').addEventListener('click',toggleBlockchain);
document.getElementById('btn-run-full').addEventListener('click',runFullSuite);
</script>
</body>
</html>
