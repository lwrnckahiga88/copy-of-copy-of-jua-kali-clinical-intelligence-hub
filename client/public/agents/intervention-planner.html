<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intervention Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .bg-slate-800\/50 { background-color: rgba(30, 41, 59, 0.5); }
        .border-green-500\/30 { border-color: rgba(34, 197, 94, 0.3); }
        .text-green-400 { color: #4ade80; }
    </style>
<script>
    // Jua Kali Hub Sync Script
    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "HUB_SYNC") {
            console.log("Sync data received:", event.data.payload);
            if (window.onHubSync) window.onHubSync(event.data.payload);
        }
    });
    function broadcastToHub(data) {
        window.parent.postMessage({ type: "AGENT_DATA", payload: data }, "*");
    }
</script>
</head>
<body class="p-8">
    <div id="root">
        <div class="space-y-8">
            <div>
                <h1 class="text-3xl font-bold text-green-400 mb-2">Intervention Planner</h1>
                <p class="text-slate-400">Clinical intervention scheduling and care coordination</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-slate-800/50 border border-green-500/30 rounded-lg p-6 text-center">
                    <h3 class="text-sm text-slate-400">SCHEDULED</h3>
                    <div class="text-3xl font-bold text-green-400">8</div>
                </div>
                <div class="bg-slate-800/50 border border-cyan-500/30 rounded-lg p-6 text-center">
                    <h3 class="text-sm text-slate-400">IN PROGRESS</h3>
                    <div class="text-3xl font-bold text-cyan-400">3</div>
                </div>
                <div class="bg-slate-800/50 border border-purple-500/30 rounded-lg p-6 text-center">
                    <h3 class="text-sm text-slate-400">COMPLETED</h3>
                    <div class="text-3xl font-bold text-purple-400">24</div>
                </div>
            </div>
            <div class="bg-slate-800/50 border border-cyan-500/30 rounded-lg p-6">
                <h2 class="text-xl font-bold text-cyan-400 mb-4">Today's Interventions</h2>
                <div class="space-y-4">
                    <div class="bg-slate-900/50 rounded-lg p-4 border border-slate-700/50 flex justify-between">
                        <div>
                            <span class="text-slate-400">09:00</span>
                            <h3 class="text-slate-200 font-semibold inline ml-2">Morning Labs</h3>
                        </div>
                        <span class="bg-green-900/30 text-green-400 px-2 py-1 rounded text-xs">✓ Done</span>
                    </div>
                    <div class="bg-slate-900/50 rounded-lg p-4 border border-slate-700/50 flex justify-between">
                        <div>
                            <span class="text-slate-400">10:30</span>
                            <h3 class="text-slate-200 font-semibold inline ml-2">Physical Therapy</h3>
                        </div>
                        <span class="bg-cyan-900/30 text-cyan-400 px-2 py-1 rounded text-xs">→ Active</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
