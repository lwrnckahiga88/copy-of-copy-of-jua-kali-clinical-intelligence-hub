name: fix/vite-dynamic-import

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-vite-import:
    runs-on: ubuntu-latest

    env:
      BRANCH: fix/vite-dynamic-import
      TARGET: server/_core/vite.ts

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create or reset fix branch
        run: git checkout -B "$BRANCH"

      - name: Replace vite.ts with dynamic-import version
        run: |
          cat > "$TARGET" << 'ENDOFFILE'
          import express, { type Express } from "express";
          import fs from "fs";
          import { type Server } from "http";
          import path from "path";

          export async function setupVite(app: Express, server: Server) {
            const { createServer: createViteServer } = await import("vite");
            const { default: viteConfig } = await import("../../vite.config.js");

            const vite = await createViteServer({
              ...viteConfig,
              configFile: false,
              server: {
                middlewareMode: true,
                hmr: { server },
                allowedHosts: true as const,
              },
              appType: "custom",
            });

            app.use(vite.middlewares);

            app.use("*", async (req, res, next) => {
              const url = req.originalUrl;
              try {
                const clientTemplate = path.resolve(
                  import.meta.dirname,
                  "../..",
                  "client",
                  "index.html"
                );
                let template = await fs.promises.readFile(clientTemplate, "utf-8");
                const { nanoid } = await import("nanoid");
                template = template.replace(
                  `src="/src/main.tsx"`,
                  `src="/src/main.tsx?v=${nanoid()}"`
                );
                const page = await vite.transformIndexHtml(url, template);
                res.status(200).set({ "Content-Type": "text/html" }).end(page);
              } catch (e) {
                vite.ssrFixStacktrace(e as Error);
                next(e);
              }
            });
          }

          export function serveStatic(app: Express) {
            const distPath =
              process.env.NODE_ENV === "development"
                ? path.resolve(import.meta.dirname, "../..", "dist", "public")
                : path.resolve(import.meta.dirname, "public");

            if (!fs.existsSync(distPath)) {
              console.error(
                `Could not find the build directory: ${distPath}, make sure to build the client first`
              );
            }

            app.use(express.static(distPath));

            app.use("*", (_req, res) => {
              res.sendFile(path.resolve(distPath, "index.html"));
            });
          }
          ENDOFFILE

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TARGET"
          git commit -m "fix: use dynamic imports for vite in server/_core/vite.ts

          Static top-level imports of 'vite' and 'vite.config' caused
          ERR_MODULE_NOT_FOUND at production startup. esbuild bundles the
          server with --packages=external so vite stays unresolved in
          dist/index.js, and vite is a devDependency absent in production.

          Node.js resolves all static imports at startup before any
          if (NODE_ENV) branch runs, so the server crashed immediately.

          Fix: dynamic import() inside setupVite() so production never
          touches vite at all."

      - name: Push branch (force to overwrite stale remote)
        run: git push origin "$BRANCH" --force

      - name: Close existing PR if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            echo "Closing stale PR #$PR"
            gh pr close "$PR" --comment "Superseded by re-run of fix workflow."
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: dynamic import vite in server/_core/vite.ts (ERR_MODULE_NOT_FOUND)" \
            --body "## Problem

          Production startup crashes with \`ERR_MODULE_NOT_FOUND: Cannot find package 'vite'\`.

          **Root cause:** \`server/_core/vite.ts\` has static top-level imports of \`vite\` and \`vite.config\`. esbuild bundles the server with \`--packages=external\`, leaving them unresolved in \`dist/index.js\`. Since \`vite\` is a \`devDependency\` it is not installed in the production container. Node.js resolves all static imports at startup â€” before any \`if (NODE_ENV)\` branch runs â€” so the server crashes immediately even though \`setupVite()\` is correctly guarded.

          ## Fix

          Convert the \`vite\` and \`vite.config\` imports inside \`setupVite()\` to dynamic \`import()\` calls. They now only execute when \`setupVite()\` is actually invoked (dev only).

          ## Files changed
          - \`server/_core/vite.ts\`

          ## Checklist
          - [ ] Production server starts without ERR_MODULE_NOT_FOUND
          - [ ] Dev HMR still works
          - [ ] Static files served correctly in production" \
            --base main \
            --head "$BRANCH"
