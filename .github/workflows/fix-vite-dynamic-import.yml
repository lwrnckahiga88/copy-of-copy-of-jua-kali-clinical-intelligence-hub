name: fix/vite-dynamic-import

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-vite-import:
    runs-on: ubuntu-latest

    env:
      BRANCH: fix/vite-dynamic-import
      TARGET: server/_core/vite.ts

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create fix branch
        run: git checkout -b "$BRANCH"

      - name: Replace vite.ts with dynamic-import version
        run: |
          cat > "$TARGET" << 'ENDOFFILE'
          import express, { type Express } from "express";
          import fs from "fs";
          import { type Server } from "http";
          import path from "path";

          export async function setupVite(app: Express, server: Server) {
            // Dynamic imports so vite is never resolved in production
            const { createServer: createViteServer } = await import("vite");
            const { default: viteConfig } = await import("../../vite.config.js");

            const vite = await createViteServer({
              ...viteConfig,
              configFile: false,
              server: {
                middlewareMode: true,
                hmr: { server },
                allowedHosts: true as const,
              },
              appType: "custom",
            });

            app.use(vite.middlewares);

            app.use("*", async (req, res, next) => {
              const url = req.originalUrl;
              try {
                const clientTemplate = path.resolve(
                  import.meta.dirname,
                  "../..",
                  "client",
                  "index.html"
                );
                let template = await fs.promises.readFile(clientTemplate, "utf-8");
                const { nanoid } = await import("nanoid");
                template = template.replace(
                  `src="/src/main.tsx"`,
                  `src="/src/main.tsx?v=${nanoid()}"`
                );
                const page = await vite.transformIndexHtml(url, template);
                res.status(200).set({ "Content-Type": "text/html" }).end(page);
              } catch (e) {
                vite.ssrFixStacktrace(e as Error);
                next(e);
              }
            });
          }

          export function serveStatic(app: Express) {
            const distPath =
              process.env.NODE_ENV === "development"
                ? path.resolve(import.meta.dirname, "../..", "dist", "public")
                : path.resolve(import.meta.dirname, "public");

            if (!fs.existsSync(distPath)) {
              console.error(
                `Could not find the build directory: ${distPath}, make sure to build the client first`
              );
            }

            app.use(express.static(distPath));

            app.use("*", (_req, res) => {
              res.sendFile(path.resolve(distPath, "index.html"));
            });
          }
          ENDOFFILE

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TARGET"
          git commit -m "fix: use dynamic imports for vite in server/_core/vite.ts

          Static top-level imports of 'vite' and 'vite.config' caused
          ERR_MODULE_NOT_FOUND at production startup because esbuild bundles
          the server with --packages=external, leaving vite unresolved, and
          vite is a devDependency not installed in the production container.

          Even though setupVite() is guarded behind NODE_ENV=development, Node.js
          resolves all static imports at startup before any code runs.

          Fix: convert the vite and vite.config imports inside setupVite() to
          dynamic import() calls. They now only execute when setupVite() is
          actually called (i.e. in development), so production never touches them."

      - name: Push branch
        run: git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: dynamic import vite in server/_core/vite.ts (ERR_MODULE_NOT_FOUND)" \
            --body "## Problem

          Production startup crashes with:
          \`\`\`
          Error [ERR_MODULE_NOT_FOUND]: Cannot find package 'vite'
          \`\`\`

          **Root cause:** \`server/_core/vite.ts\` has static top-level imports of \`vite\` and \`vite.config\`. The esbuild step bundles the server with \`--packages=external\`, leaving these imports unresolved in \`dist/index.js\`. Since \`vite\` is a \`devDependency\`, it is not installed in the production container. Node.js resolves **all** static imports at startup â€” before any \`if (NODE_ENV)\` branch runs â€” so the server crashes immediately even though \`setupVite()\` is correctly guarded.

          ## Fix

          Convert the \`vite\` and \`vite.config\` imports inside \`setupVite()\` to dynamic \`import()\` calls. They now only execute when \`setupVite()\` is actually invoked (development only), so production startup never touches them.

          ## Files changed
          - \`server/_core/vite.ts\` â€” static imports â†’ dynamic imports inside \`setupVite()\`

          ## Checklist
          - [ ] Production server starts without ERR_MODULE_NOT_FOUND
          - [ ] Dev server HMR still works (\`pnpm dev\`)
          - [ ] Static files served correctly in production" \
            --base main \
            --head "$BRANCH"
