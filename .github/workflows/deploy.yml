      # â”€â”€ Commit and push all changes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git status
          git commit -m "feat: bypass auth, 49 agents, imaging dashboard, k-emci, skills agent, Node 18 fixes" || echo "Nothing to commit"
          git push

      # â”€â”€ Deploy to Railway â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway up --detach --service juakali-clinical-hub
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run DB migrations
        run: |
          npm install -g @railway/cli
          railway run --service juakali-clinical-hub pnpm db:push
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
