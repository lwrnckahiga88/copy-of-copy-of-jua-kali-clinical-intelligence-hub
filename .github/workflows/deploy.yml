      # â”€â”€ Fix vite.config.ts â€” Node 18 polyfill, remove Manus runtime â”€â”€â”€â”€â”€â”€â”€
      - name: Fix vite.config.ts
        run: |
          cat > vite.config.ts << 'HEREDOC'
          import tailwindcss from "@tailwindcss/vite";
          import react from "@vitejs/plugin-react";
          import fs from "node:fs";
          import path from "node:path";
          import { fileURLToPath } from "node:url";
          import { defineConfig, type Plugin, type ViteDevServer } from "vite";

          const __filename = fileURLToPath(import.meta.url);
          const __dirname = path.dirname(__filename);

          const LOG_DIR = path.join(__dirname, ".manus-logs");
          const MAX_LOG_SIZE_BYTES = 1 * 1024 * 1024;
          const TRIM_TARGET_BYTES = Math.floor(MAX_LOG_SIZE_BYTES * 0.6);

          type LogSource = "browserConsole" | "networkRequests" | "sessionReplay";

          function ensureLogDir() {
            if (!fs.existsSync(LOG_DIR)) fs.mkdirSync(LOG_DIR, { recursive: true });
          }

          function trimLogFile(logPath: string, maxSize: number) {
            try {
              if (!fs.existsSync(logPath) || fs.statSync(logPath).size <= maxSize) return;
              const lines = fs.readFileSync(logPath, "utf-8").split("\n");
              const keptLines: string[] = [];
              let keptBytes = 0;
              for (let i = lines.length - 1; i >= 0; i--) {
                const lineBytes = Buffer.byteLength(`${lines[i]}\n`, "utf-8");
                if (keptBytes + lineBytes > TRIM_TARGET_BYTES) break;
                keptLines.unshift(lines[i]);
                keptBytes += lineBytes;
              }
              fs.writeFileSync(logPath, keptLines.join("\n"), "utf-8");
            } catch { /* ignore */ }
          }

          function writeToLogFile(source: LogSource, entries: unknown[]) {
            if (entries.length === 0) return;
            ensureLogDir();
            const logPath = path.join(LOG_DIR, `${source}.log`);
            const lines = entries.map((e) => `[${new Date().toISOString()}] ${JSON.stringify(e)}`);
            fs.appendFileSync(logPath, `${lines.join("\n")}\n`, "utf-8");
            trimLogFile(logPath, MAX_LOG_SIZE_BYTES);
          }

          function vitePluginManusDebugCollector(): Plugin {
            return {
              name: "manus-debug-collector",
              transformIndexHtml(html) {
                if (process.env.NODE_ENV === "production") return html;
                return { html, tags: [{ tag: "script", attrs: { src: "/__manus__/debug-collector.js", defer: true }, injectTo: "head" as const }] };
              },
              configureServer(server: ViteDevServer) {
                server.middlewares.use("/__manus__/logs", (req, res, next) => {
                  if (req.method !== "POST") return next();
                  const handlePayload = (payload: any) => {
                    if (payload.consoleLogs?.length > 0) writeToLogFile("browserConsole", payload.consoleLogs);
                    if (payload.networkRequests?.length > 0) writeToLogFile("networkRequests", payload.networkRequests);
                    if (payload.sessionEvents?.length > 0) writeToLogFile("sessionReplay", payload.sessionEvents);
                    res.writeHead(200, { "Content-Type": "application/json" });
                    res.end(JSON.stringify({ success: true }));
                  };
                  const reqBody = (req as { body?: unknown }).body;
                  if (reqBody && typeof reqBody === "object") {
                    try { handlePayload(reqBody); } catch (e) { res.writeHead(400, { "Content-Type": "application/json" }); res.end(JSON.stringify({ success: false, error: String(e) })); }
                    return;
                  }
                  let body = "";
                  req.on("data", (chunk) => { body += chunk.toString(); });
                  req.on("end", () => {
                    try { handlePayload(JSON.parse(body)); }
                    catch (e) { res.writeHead(400, { "Content-Type": "application/json" }); res.end(JSON.stringify({ success: false, error: String(e) })); }
                  });
                });
              },
            };
          }

          export default defineConfig({
            plugins: [react(), tailwindcss(), vitePluginManusDebugCollector()],
            resolve: {
              alias: {
                "@": path.resolve(__dirname, "client", "src"),
                "@shared": path.resolve(__dirname, "shared"),
                "@assets": path.resolve(__dirname, "attached_assets"),
              },
            },
            envDir: path.resolve(__dirname),
            root: path.resolve(__dirname, "client"),
            publicDir: path.resolve(__dirname, "client", "public"),
            build: {
              outDir: path.resolve(__dirname, "dist/public"),
              emptyOutDir: true,
            },
            server: {
              host: true,
              allowedHosts: [".manuspre.computer", ".manus.computer", "localhost", "127.0.0.1"],
            },
          });
          HEREDOC

      # â”€â”€ Fix server/vite.ts â€” Node 18 polyfill â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Fix server vite.ts
        run: |
          cat > server/_core/vite.ts << 'HEREDOC'
          import express, { type Express } from "express";
          import fs from "fs";
          import { type Server } from "http";
          import { nanoid } from "nanoid";
          import path from "path";
          import { fileURLToPath } from "url";
          import { createServer as createViteServer } from "vite";
          import viteConfig from "../../vite.config";

          const __filename = fileURLToPath(import.meta.url);
          const __dirname = path.dirname(__filename);

          export async function setupVite(app: Express, server: Server) {
            const vite = await createViteServer({
              ...viteConfig,
              configFile: false,
              server: { middlewareMode: true, hmr: { server }, allowedHosts: true as const },
              appType: "custom",
            });
            app.use(vite.middlewares);
            app.use("*", async (req, res, next) => {
              const url = req.originalUrl;
              try {
                const clientTemplate = path.resolve(__dirname, "../..", "client", "index.html");
                let template = await fs.promises.readFile(clientTemplate, "utf-8");
                template = template.replace(`src="/src/main.tsx"`, `src="/src/main.tsx?v=${nanoid()}"`);
                const page = await vite.transformIndexHtml(url, template);
                res.status(200).set({ "Content-Type": "text/html" }).end(page);
              } catch (e) {
                vite.ssrFixStacktrace(e as Error);
                next(e);
              }
            });
          }

          export function serveStatic(app: Express) {
            const distPath = path.resolve(__dirname, "public");
            if (!fs.existsSync(distPath)) {
              console.error(`[Static] Build directory not found: ${distPath}`);
            }
            app.use(express.static(distPath));
            app.use("*", (_req, res) => {
              const indexPath = path.resolve(distPath, "index.html");
              if (!fs.existsSync(indexPath)) { res.status(404).send("index.html not found"); return; }
              res.sendFile(indexPath);
            });
          }
          HEREDOC

