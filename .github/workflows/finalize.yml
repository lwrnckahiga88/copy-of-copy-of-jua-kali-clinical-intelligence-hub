name: fix/dockerfile-final

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      BRANCH: fix/dockerfile-final
      DOCKERFILE_B64: 
      VITETS_B64: 

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create or reset branch
        run: git checkout -B "$BRANCH"

      - name: Write Dockerfile from base64
        run: echo "$DOCKERFILE_B64" | base64 -d > Dockerfile

      - name: Write server/_core/vite.ts from base64
        run: echo "$VITETS_B64" | base64 -d > server/_core/vite.ts

      - name: Verify files
        run: |
          echo "=== Dockerfile ==="
          cat Dockerfile
          echo ""
          echo "=== Checking /app/public is gone ==="
          grep "app/public" Dockerfile && echo "ERROR: bad line found" || echo "OK: /app/public not present"

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile server/_core/vite.ts
          git commit -m "fix: remove /app/public COPY, fix static path and ESM healthcheck"

      - name: Push
        run: git push origin "$BRANCH" --force

      - name: Print PR URL
        run: |
          echo "Open PR at:"
          echo "https://github.com/lwrnckahiga88/copy-of-copy-of-jua-kali-clinical-intelligence-hub/compare/main...$BRANCH"
