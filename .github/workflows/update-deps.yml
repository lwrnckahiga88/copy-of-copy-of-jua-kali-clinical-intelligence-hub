name: Update Dependencies
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm update whatwg-url @exodus/bytes --latest
      - run: pnpm install --no-frozen-lockfile
      - uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "fix: update whatwg-url and @exodus/bytes for Node 20 compat"
          title: "fix: update whatwg-url and @exodus/bytes for Node 20 compat"
          branch: update-deps
