name: fix/dockerfile-final

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      BRANCH: fix/dockerfile-final

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create or reset branch
        run: git checkout -B "$BRANCH"

      - name: Write Dockerfile via Python (avoids heredoc indentation issues)
        run: |
          python3 << 'PYEOF'
          content = """# Build stage
FROM node:22-alpine AS builder

WORKDIR /app

RUN npm install -g pnpm@10

COPY pnpm-lock.yaml package.json ./
COPY patches ./patches

RUN pnpm install --no-frozen-lockfile

COPY . .

RUN pnpm build

RUN npx workbox-cli generateSW workbox-config.cjs

# Production stage
FROM node:22-alpine

WORKDIR /app

RUN npm install -g pnpm@10

COPY pnpm-lock.yaml package.json ./
COPY patches ./patches

RUN pnpm install --no-frozen-lockfile --prod

COPY --from=builder /app/dist ./dist

COPY --from=builder /app/client/dist ./dist/public

EXPOSE 3000

HEALTHCHECK --interval=30s --timeout=10s --start-period=15s --retries=3 \\
  CMD node --input-type=module --eval "const r=await fetch('http://localhost:3000/');if(!r.ok)process.exit(1);"

CMD ["node", "dist/index.js"]
"""
          with open("Dockerfile", "w") as f:
              f.write(content)
          print("Dockerfile written successfully")
          PYEOF

      - name: Write server/_core/vite.ts via Python
        run: |
          python3 << 'PYEOF'
          content = """import express, { type Express } from "express";
import fs from "fs";
import { type Server } from "http";
import path from "path";

export async function setupVite(app: Express, server: Server) {
  const { createServer: createViteServer } = await import("vite");
  const { default: viteConfig } = await import("../../vite.config.js");

  const vite = await createViteServer({
    ...viteConfig,
    configFile: false,
    server: {
      middlewareMode: true,
      hmr: { server },
      allowedHosts: true as const,
    },
    appType: "custom",
  });

  app.use(vite.middlewares);

  app.use("*", async (req, res, next) => {
    const url = req.originalUrl;
    try {
      const clientTemplate = path.resolve(
        import.meta.dirname,
        "../..",
        "client",
        "index.html"
      );
      let template = await fs.promises.readFile(clientTemplate, "utf-8");
      const { nanoid } = await import("nanoid");
      template = template.replace(
        `src="/src/main.tsx"`,
        `src="/src/main.tsx?v=${nanoid()}"`
      );
      const page = await vite.transformIndexHtml(url, template);
      res.status(200).set({ "Content-Type": "text/html" }).end(page);
    } catch (e) {
      vite.ssrFixStacktrace(e as Error);
      next(e);
    }
  });
}

export function serveStatic(app: Express) {
  const distPath = path.resolve(import.meta.dirname, "public");

  if (!fs.existsSync(distPath)) {
    console.error(
      `Could not find the build directory: ${distPath}, make sure to build the client first`
    );
  }

  app.use(express.static(distPath));

  app.use("*", (_req, res) => {
    res.sendFile(path.resolve(distPath, "index.html"));
  });
}
"""
          with open("server/_core/vite.ts", "w") as f:
              f.write(content)
          print("vite.ts written successfully")
          PYEOF

      - name: Verify Dockerfile has no leading spaces
        run: |
          echo "=== Dockerfile contents ==="
          cat -A Dockerfile | head -20
          echo "=== Checking for /app/public ==="
          grep -n "app/public" Dockerfile && echo "FOUND - bad line still present" || echo "OK - not found"

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile server/_core/vite.ts
          git diff --cached --stat
          git commit -m "fix: remove /app/public COPY, fix static path and ESM healthcheck

          - Remove COPY --from=builder /app/public ./dist/public (dir does not exist)
          - Copy client/dist to dist/public to match serveStatic() path resolution
          - Replace require()-based HEALTHCHECK with ESM-safe fetch()
          - Use dynamic import() in setupVite() to avoid vite resolution in prod"

      - name: Push
        run: git push origin "$BRANCH" --force

      - name: Open PR URL
        run: |
          echo ""
          echo "=========================================="
          echo "Merge the PR at:"
          echo "https://github.com/lwrnckahiga88/copy-of-copy-of-jua-kali-clinical-intelligence-hub/compare/main...$BRANCH"
          echo "=========================================="
