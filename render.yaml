services:
  - type: web
    name: juakali-clinical-hub
    runtime: node
    region: oregon
    plan: free
    buildCommand: node_modules/.bin/vite build && node_modules/.bin/esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APIFY_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
